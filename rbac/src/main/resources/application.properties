# ===========================================
# Server Configuration
# ===========================================
server.port=8080

# ===========================================
# Database Configuration (MySQL)
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/rbac_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Wardha@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================================
# JPA Configuration
# ===========================================
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===========================================
# SQL Initialization
# ===========================================
spring.sql.init.continue-on-error=false

# ===========================================
# JWT Configuration
# ===========================================
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsAtLeast32CharactersLong
jwt.expiration=86400000

# ===========================================
# Logging Configuration
# ===========================================
logging.level.org.springframework.security=DEBUG
logging.level.com.example.rbac=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===========================================
# Swagger/OpenAPI
# ===========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===========================================
# Additional Settings
# ===========================================
spring.main.allow-circular-references=true